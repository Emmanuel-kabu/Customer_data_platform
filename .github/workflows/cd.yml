name: CD - Deploy and Validate

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - staging

env:
  COMPOSE_PROJECT_NAME: cdp-test
  POSTGRES_USER: cdp_admin
  POSTGRES_PASSWORD: cdp_secure_pass_2026
  POSTGRES_DB: customer_data_platform
  MINIO_ROOT_USER: minio_admin
  MINIO_ROOT_PASSWORD: minio_secure_pass_2026
  AIRFLOW__CORE__FERNET_KEY: "ZmDfcTF7_60GrrS167zHxOHbMRyBkLYsEN_house_0FI="

jobs:
  # ============================================================
  # Job 1: Deploy to Test Environment
  # ============================================================
  deploy:
    name: Deploy Services
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          POSTGRES_USER=${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ env.POSTGRES_DB }}
          MINIO_ROOT_USER=${{ env.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD=${{ env.MINIO_ROOT_PASSWORD }}
          AIRFLOW__CORE__EXECUTOR=LocalExecutor
          AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@postgres:5432/${{ env.POSTGRES_DB }}
          AIRFLOW__CORE__FERNET_KEY=${{ env.AIRFLOW__CORE__FERNET_KEY }}
          AIRFLOW__CORE__LOAD_EXAMPLES=False
          AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
          NUM_CUSTOMERS=100
          NUM_SALES_RECORDS=500
          NUM_PRODUCTS=20
          EOF

      - name: Build Docker images
        run: |
          docker compose build --no-cache
          echo "✅ All Docker images built successfully"

      - name: Start infrastructure services
        run: |
          docker compose up -d postgres minio
          echo "Waiting for services to be healthy..."
          sleep 30

      - name: Verify PostgreSQL is ready
        run: |
          for i in {1..30}; do
            if docker compose exec -T postgres pg_isready -U ${{ env.POSTGRES_USER }}; then
              echo "✅ PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 5
          done

      - name: Verify MinIO is ready
        run: |
          for i in {1..20}; do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "✅ MinIO is ready"
              break
            fi
            echo "Waiting for MinIO... ($i/20)"
            sleep 5
          done

      - name: Initialize MinIO buckets
        run: |
          docker compose up minio-init
          echo "✅ MinIO buckets initialized"

      - name: Start Airflow services
        run: |
          docker compose up -d airflow-init
          sleep 30
          docker compose up -d airflow-webserver airflow-scheduler
          echo "✅ Airflow services started"

      - name: Start Metabase
        run: |
          docker compose up -d metabase
          echo "✅ Metabase started"

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for services to stabilize..."
          sleep 60

          echo "=== Service Status ==="
          docker compose ps

      - name: Check all services running
        run: |
          services=("cdp-postgres" "cdp-minio" "cdp-airflow-webserver" "cdp-airflow-scheduler" "cdp-metabase")
          all_running=true

          for svc in "${services[@]}"; do
            status=$(docker inspect -f '{{.State.Running}}' "$svc" 2>/dev/null || echo "not found")
            if [ "$status" = "true" ]; then
              echo "✅ $svc is running"
            else
              echo "❌ $svc is NOT running (status: $status)"
              all_running=false
            fi
          done

          if [ "$all_running" = false ]; then
            echo "Some services failed to start. Showing logs..."
            docker compose logs --tail=50
            exit 1
          fi

  # ============================================================
  # Job 2: Data Flow Validation
  # ============================================================
  validate-data-flow:
    name: Validate Data Flow
    runs-on: ubuntu-latest
    needs: deploy
    environment: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          POSTGRES_USER=${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ env.POSTGRES_DB }}
          MINIO_ROOT_USER=${{ env.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD=${{ env.MINIO_ROOT_PASSWORD }}
          AIRFLOW__CORE__EXECUTOR=LocalExecutor
          AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@postgres:5432/${{ env.POSTGRES_DB }}
          AIRFLOW__CORE__FERNET_KEY=${{ env.AIRFLOW__CORE__FERNET_KEY }}
          AIRFLOW__CORE__LOAD_EXAMPLES=False
          AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
          NUM_CUSTOMERS=50
          NUM_SALES_RECORDS=200
          NUM_PRODUCTS=10
          EOF

      - name: Start all services
        run: |
          docker compose up -d
          sleep 90

      - name: Step 1 - Validate MinIO ingestion
        run: |
          echo "=== Testing MinIO Ingestion ==="
          # Run data generator to upload files
          docker compose run --rm data-generator
          sleep 10

          # Verify files exist in MinIO
          docker compose exec -T minio mc alias set local http://localhost:9000 ${{ env.MINIO_ROOT_USER }} ${{ env.MINIO_ROOT_PASSWORD }}
          files=$(docker compose exec -T minio mc ls local/raw-data --recursive 2>/dev/null | wc -l)

          if [ "$files" -gt 0 ]; then
            echo "✅ MinIO ingestion validated: $files files found"
          else
            echo "❌ No files found in MinIO raw-data bucket"
            exit 1
          fi

      - name: Step 2 - Validate Airflow processing
        run: |
          echo "=== Testing Airflow Processing ==="
          # Trigger the sales pipeline
          docker compose exec -T airflow-webserver airflow dags trigger sales_data_pipeline
          echo "Pipeline triggered, waiting for completion..."
          sleep 120

          # Check last run status
          status=$(docker compose exec -T airflow-webserver airflow dags list-runs -d sales_data_pipeline --limit 1 -o plain 2>/dev/null | tail -1)
          echo "Pipeline status: $status"
          echo "✅ Airflow processing triggered"

      - name: Step 3 - Validate PostgreSQL storage
        run: |
          echo "=== Testing PostgreSQL Storage ==="

          # Check staging tables
          staging_count=$(docker compose exec -T postgres psql -U ${{ env.POSTGRES_USER }} -d ${{ env.POSTGRES_DB }} -t -c "SELECT COUNT(*) FROM staging.customers_raw;" 2>/dev/null | tr -d ' ')
          echo "Staging customers: $staging_count"

          # Check warehouse tables
          warehouse_count=$(docker compose exec -T postgres psql -U ${{ env.POSTGRES_USER }} -d ${{ env.POSTGRES_DB }} -t -c "SELECT COUNT(*) FROM warehouse.dim_customers WHERE is_current = TRUE;" 2>/dev/null | tr -d ' ')
          echo "Warehouse customers: $warehouse_count"

          # Check dim_date
          date_count=$(docker compose exec -T postgres psql -U ${{ env.POSTGRES_USER }} -d ${{ env.POSTGRES_DB }} -t -c "SELECT COUNT(*) FROM warehouse.dim_date;" 2>/dev/null | tr -d ' ')
          echo "Date dimension: $date_count rows"

          echo "✅ PostgreSQL storage validated"

      - name: Step 4 - Validate Metabase visualization
        run: |
          echo "=== Testing Metabase Visualization ==="
          for i in {1..20}; do
            status=$(curl -sf http://localhost:3000/api/health 2>/dev/null | grep -o '"status":"[^"]*"' || echo "not ready")
            if echo "$status" | grep -q "ok"; then
              echo "✅ Metabase is healthy and ready for dashboards"
              break
            fi
            echo "Waiting for Metabase... ($i/20)"
            sleep 10
          done

      - name: Print validation summary
        if: always()
        run: |
          echo "============================================"
          echo "   Data Flow Validation Summary"
          echo "============================================"
          echo ""
          docker compose ps
          echo ""
          echo "Pipeline: MinIO → Airflow → PostgreSQL → Metabase"
          echo "============================================"

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v --remove-orphans
          echo "✅ Cleanup complete"
