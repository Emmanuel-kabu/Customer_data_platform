version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  environment:
    - AIRFLOW__CORE__EXECUTOR=${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
    - AIRFLOW__CORE__SQL_ALCHEMY_CONN=${AIRFLOW__CORE__SQL_ALCHEMY_CONN}
    - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
    - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW__CORE__LOAD_EXAMPLES:-False}
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=${AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION:-False}
    - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=${AIRFLOW__WEBSERVER__EXPOSE_CONFIG:-True}
    - AIRFLOW__SMTP__SMTP_HOST=${AIRFLOW__SMTP__SMTP_HOST:-smtp.gmail.com}
    - AIRFLOW__SMTP__SMTP_PORT=${AIRFLOW__SMTP__SMTP_PORT:-587}
    - AIRFLOW__SMTP__SMTP_STARTTLS=${AIRFLOW__SMTP__SMTP_STARTTLS:-True}
    - AIRFLOW__SMTP__SMTP_SSL=${AIRFLOW__SMTP__SMTP_SSL:-False}
    - AIRFLOW__SMTP__SMTP_USER=${AIRFLOW__SMTP__SMTP_USER:-}
    - AIRFLOW__SMTP__SMTP_PASSWORD=${AIRFLOW__SMTP__SMTP_PASSWORD:-}
    - AIRFLOW__SMTP__SMTP_MAIL_FROM=${AIRFLOW__SMTP__SMTP_MAIL_FROM:-airflow@cdp.local}
    - POSTGRES_USER=${POSTGRES_USER:-cdp_admin}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cdp_secure_pass_2026}
    - POSTGRES_DB=${POSTGRES_DB:-customer_data_platform}
    - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minio_admin}
    - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minio_secure_pass_2026}
    - MINIO_ENDPOINT=minio:9000
    - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    - SLACK_CHANNEL=${SLACK_CHANNEL:-#data-platform-alerts}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./data:/opt/airflow/data
    - ./plugins:/opt/airflow/plugins
    - ./tests:/opt/airflow/tests
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy
  networks:
    - cdp-network
  restart: unless-stopped

services:
  # ============================================================
  # PostgreSQL - Data Warehouse
  # ============================================================
  postgres:
    image: postgres:15-alpine
    container_name: cdp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cdp_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cdp_secure_pass_2026}
      POSTGRES_DB: ${POSTGRES_DB:-customer_data_platform}
      POSTGRES_MULTIPLE_DATABASES: "customer_data_platform,metabase,airflow"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
      - ./docker/postgres/init-schema.sql:/docker-entrypoint-initdb.d/02-init-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cdp_admin} -d ${POSTGRES_DB:-customer_data_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cdp-network
    restart: unless-stopped

  # ============================================================
  # MinIO - Object Storage (S3-Compatible)
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: cdp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secure_pass_2026}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cdp-network
    restart: unless-stopped

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: cdp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set cdp http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb cdp/raw-data --ignore-existing;
      mc mb cdp/processed-data --ignore-existing;
      mc mb cdp/archive-data --ignore-existing;
      mc anonymous set download cdp/raw-data;
      mc event add cdp/raw-data arn:minio:sqs::_:webhook --event put --ignore-existing || true;
      echo 'MinIO buckets initialized successfully';
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secure_pass_2026}
    networks:
      - cdp-network

  # ============================================================
  # Apache Airflow - Workflow Orchestration
  # ============================================================
  airflow-init:
    <<: *airflow-common
    container_name: cdp-airflow-init
    entrypoint: >
      /bin/bash -c "
      airflow db init;
      airflow db upgrade;
      airflow users create
        --username $${AIRFLOW_ADMIN_USER:-admin}
        --password $${AIRFLOW_ADMIN_PASSWORD:-admin_pass_2026}
        --firstname Admin
        --lastname User
        --role Admin
        --email $${AIRFLOW_ADMIN_EMAIL:-admin@cdp.local};
      airflow connections add 'postgres_cdp'
        --conn-type 'postgres'
        --conn-host 'postgres'
        --conn-schema '$${POSTGRES_DB:-customer_data_platform}'
        --conn-login '$${POSTGRES_USER:-cdp_admin}'
        --conn-password '$${POSTGRES_PASSWORD:-cdp_secure_pass_2026}'
        --conn-port '5432' || true;
      airflow connections add 'minio_s3'
        --conn-type 's3'
        --conn-extra '{\"aws_access_key_id\": \"$${MINIO_ROOT_USER:-minio_admin}\", \"aws_secret_access_key\": \"$${MINIO_ROOT_PASSWORD:-minio_secure_pass_2026}\", \"endpoint_url\": \"http://minio:9000\"}' || true;
      echo 'Airflow initialized successfully';
      "
    environment:
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=${AIRFLOW__CORE__SQL_ALCHEMY_CONN}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
      - AIRFLOW_ADMIN_USER=${AIRFLOW_ADMIN_USER:-admin}
      - AIRFLOW_ADMIN_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:-admin_pass_2026}
      - AIRFLOW_ADMIN_EMAIL=${AIRFLOW_ADMIN_EMAIL:-admin@cdp.local}
      - POSTGRES_USER=${POSTGRES_USER:-cdp_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cdp_secure_pass_2026}
      - POSTGRES_DB=${POSTGRES_DB:-customer_data_platform}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minio_admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minio_secure_pass_2026}
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: cdp-airflow-webserver
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-scheduler:
    <<: *airflow-common
    container_name: cdp-airflow-scheduler
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================
  # Metabase - Business Intelligence & Dashboards
  # ============================================================
  metabase:
    image: metabase/metabase:latest
    container_name: cdp-metabase
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-cdp_admin}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-cdp_secure_pass_2026}
      MB_DB_HOST: postgres
      JAVA_TIMEZONE: UTC
    ports:
      - "${METABASE_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - cdp-network
    restart: unless-stopped

  # ============================================================
  # Data Generator Service
  # ============================================================
  data-generator:
    build:
      context: .
      dockerfile: docker/data-generator/Dockerfile
    container_name: cdp-data-generator
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secure_pass_2026}
      MINIO_ENDPOINT: minio:9000
      NUM_CUSTOMERS: ${NUM_CUSTOMERS:-1000}
      NUM_SALES_RECORDS: ${NUM_SALES_RECORDS:-5000}
      NUM_PRODUCTS: ${NUM_PRODUCTS:-50}
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
    networks:
      - cdp-network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  metabase_data:
    driver: local
  airflow_logs:
    driver: local

networks:
  cdp-network:
    driver: bridge
    name: cdp-network
